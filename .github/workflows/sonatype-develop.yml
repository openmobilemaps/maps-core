  layerGps:
    name: Create layer-gps update pull request
    # needs: build
    runs-on: macos-12
    steps:
      - name: Switch to Xcode 14.2.0
        run: sudo xcode-select --switch /Applications/Xcode_14.2.0.app
      - name: Checkout layer-gps
        uses: actions/checkout@v2
        with:
          repository: "openmobilemaps/layer-gps"
          ref: "old-version"
      - name: Update version numbers in layer-gps
        run: |
          sed -i'' -e  "s/io.openmobilemaps:mapscore-dev.*/io.openmobilemaps:mapscore-dev:9999'/" android/build.gradle
          rm android/build.gradle-e
          cat Package.swift
          swift package update || true
      - uses: EndBug/add-and-commit@v9
        with:
          message: "Updates mapscore"
          new_branch: "feature/update-mapscore"
      - name: Create pull request in  in layer-gps
        uses: repo-sync/pull-request@v2
        with:
          pr_title: "Updates mapscore" 
          pr_body: |                                        
            *An automated PR*
            Updates maps-core to latest develop commit
          destination_branch: "develop"
          github_token: ${{ secrets.GITHUB_TOKEN }}